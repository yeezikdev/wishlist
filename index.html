<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wishlist</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2315140f'/%3E%3Cpath d='M12 4C12 8.42 8.42 12 4 12C8.42 12 12 15.58 12 20C12 15.58 15.58 12 20 12C15.58 12 12 8.42 12 4Z' fill='%23f5c518'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#e7e2d3;
    --surface:#f8f3e6;
    --surface-2:#efe8d6;
    --text:#221f19;
    --text-2:#7c7562;
    --border:#c9bfa4;
    --accent:#1f3a5f;
    --accent-soft:#e2e7ee;
    --accent-text:#ffffff;
    --gold:#b3792a;
    --danger:#a53a2c;
    --radius:16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"]{
    --bg:#131519;
    --surface:#211d17;
    --surface-2:#2a251c;
    --text:#eee8da;
    --text-2:#a29a84;
    --border:#3c3527;
    --accent:#7fa8d9;
    --accent-soft:#1c2733;
    --accent-text:#0c1420;
    --gold:#d6a24f;
    --danger:#d97a63;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background .2s ease, color .2s ease;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .app-wrap{max-width:520px; margin:0 auto; position:relative;}
  .app{min-height:100vh; display:flex; flex-direction:column;}

  @media (min-width:760px){
    .app-wrap{max-width:1100px;}
    .topbar{padding:32px 40px 12px;}
    .chips{padding:14px 40px 20px;}
    .content{padding:4px 40px 140px;}
  }

  /* Top bar */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    padding:20px 20px 8px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1{
    font-size:27px; font-weight:700; letter-spacing:-0.02em; margin:0;
  }
  .topbar .actions{display:flex; gap:6px; align-items:center;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); cursor:pointer; flex-shrink:0;
  }
  .icon-btn svg{width:18px; height:18px;}
  .icon-btn.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}

  /* Category chips */
  .chips{
    display:flex; gap:8px; overflow-x:auto; padding:14px 20px 16px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; padding:8px 14px; border-radius:100px;
    background:var(--surface); border:1px solid var(--border);
    font-size:13px; font-weight:500; color:var(--text-2);
    cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:7px;
  }
  .chip .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .chip.selected{background:var(--text); color:var(--bg); border-color:var(--text);}
  .chip.add{color:var(--accent); border-style:dashed; border-color:var(--accent);}
  .chip .rm{
    width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;
  }

  /* Content */
  .content{flex:1; padding:4px 20px 120px;}
  @media (min-width:760px){
    .content{
      display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
      gap:16px; align-items:start;
    }
    .content .empty{grid-column:1 / -1;}
    .card{margin-bottom:0;}
  }
  .empty{
    text-align:center; padding:64px 20px; color:var(--text-2);
  }
  .empty .big{font-size:38px; margin-bottom:10px; color:var(--gold);}
  .empty p{margin:4px 0; font-size:14px; line-height:1.5;}
  .empty strong{color:var(--text);}

  /* Item card */
  .card{
    background:var(--surface);
    border-radius:22px;
    padding:32px 20px 20px;
    margin-bottom:14px;
    position:relative;
    box-shadow:0 1px 2px rgba(0,0,0,.05), 0 10px 24px -16px rgba(0,0,0,.35);
  }
  .card::before{
    content:'';
    position:absolute; top:9px; left:50%; transform:translateX(-50%);
    width:12px; height:12px; border-radius:50%;
    background:var(--bg);
    border:1px solid var(--border);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.18);
  }
  .card::after{
    content:'';
    position:absolute; inset:8px;
    border:1.5px dashed var(--border);
    border-radius:15px;
    opacity:.6;
    pointer-events:none;
  }
  .card-body{
    display:flex; gap:12px; align-items:flex-start;
  }
  .thumb-col{
    display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0;
  }
  .thumb-btn{
    border:none; padding:0; cursor:pointer; display:block; flex-shrink:0;
    background:transparent; border-radius:12px; overflow:hidden;
    -webkit-appearance:none; appearance:none;
  }
  .thumb-btn .thumb{ pointer-events:none; }
  .thumb{
    width:56px; height:56px; border-radius:12px; object-fit:cover; flex-shrink:0;
    background:var(--surface); display:block;
  }
  .thumb-col .tag{ font-size:10px; padding:3px 8px; text-align:center; }

  /* Detail sheet */
  .detail-image{
    width:100%; max-height:340px; object-fit:cover; border-radius:14px;
    background:var(--surface-2); display:block; margin-bottom:16px;
  }
  .detail-title{
    font-size:20px; font-weight:700; letter-spacing:-0.015em; color:var(--text);
    text-decoration:none; display:inline-flex; align-items:center; gap:7px;
  }
  .detail-title svg{width:15px;height:15px; opacity:.45;}
  .detail-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px;
  }
  .detail-price{font-size:22px; font-weight:800; letter-spacing:-0.02em;}
  .thumb-broken{
    display:flex; align-items:center; justify-content:center;
    color:var(--text-2); font-size:18px; font-weight:600;
    background:var(--surface-2);
  }
  .card-main{flex:1; min-width:0;}
  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:14px;
  }
  .title-line{
    display:flex; flex-wrap:wrap; align-items:center; gap:8px; flex:1; min-width:0;
  }
  .card-title{
    font-size:17.5px; font-weight:700; letter-spacing:-0.015em; line-height:1.3;
    display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--text);
    word-break:break-word;
  }
  .card-title svg{width:13px;height:13px; flex-shrink:0; opacity:.45;}
  .tag{
    display:inline-flex; align-items:center; font-size:11.5px; font-weight:700;
    padding:4px 10px; border-radius:100px; letter-spacing:-0.005em; flex-shrink:0;
  }
  .card-price{
    font-variant-numeric:tabular-nums; font-weight:800; font-size:22px;
    white-space:nowrap; letter-spacing:-0.02em; color:var(--text); flex-shrink:0;
  }
  .brand-label{
    font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-2); margin-bottom:4px;
  }
  .price-block{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
  .price-top{ display:flex; align-items:center; gap:7px; }
  .tag-sale{
    display:inline-flex; align-items:center; font-size:10.5px; font-weight:800;
    letter-spacing:.06em; text-transform:uppercase; padding:2px 8px; border-radius:4px;
    background:transparent; color:var(--danger); border:1.5px solid var(--danger);
    flex-shrink:0; transform:rotate(-6deg);
  }
  .price-old{ font-size:12.5px; color:var(--text-2); white-space:nowrap; }
  .price-old .strike{ text-decoration:line-through; }
  .price-old .pct{ font-weight:700; color:var(--danger); margin-left:4px; }
  .card-bottom{
    display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:12px;
  }
  .drag-handle{
    width:26px;height:26px;border-radius:50%; border:none; background:var(--surface-2);
    color:var(--text-2); cursor:grab; display:flex; align-items:center; justify-content:center;
    touch-action:none;
  }
  .drag-handle svg{width:14px; height:14px;}
  .drag-handle:active{cursor:grabbing;}
  .card.sortable-ghost{opacity:.35;}
  .card.sortable-drag{box-shadow:0 10px 24px rgba(0,0,0,.18);}
  .card-menu{position:relative;}
  .kebab{
    width:26px;height:26px;border-radius:50%; border:none; background:var(--surface-2);
    color:var(--text-2); cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .kebab svg{width:14px; height:14px;}
  .menu-pop{
    position:absolute; left:0; bottom:34px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; overflow:hidden; z-index:10; min-width:120px;
    box-shadow:0 6px 20px rgba(0,0,0,.15);
  }
  .menu-pop button{
    display:block; width:100%; text-align:left; padding:10px 14px; border:none; background:none;
    font-size:13.5px; color:var(--text); cursor:pointer; font-family:inherit;
  }
  .menu-pop button.del{color:var(--danger);}
  .menu-pop button:hover{background:var(--surface-2);}

  /* Installments card */
  .stub{
    margin-top:14px; padding:12px 14px; border-radius:12px;
    background:var(--accent-soft);
  }
  .stub-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:9px;
  }
  .stub-head .label{
    font-size:13px; font-weight:600; color:var(--accent); display:flex; align-items:center; gap:6px;
  }
  .stub-head .label svg{width:14px; height:14px;}
  .stub-head .note{font-size:11px; color:var(--text-2); font-weight:500;}
  .installments{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:0;
  }
  .installments .inst{
    text-align:center; padding:4px 2px; position:relative;
  }
  .installments .inst:not(:last-child){border-right:1px dotted var(--border);}
  .inst .n{font-size:10px; color:var(--text-2); letter-spacing:.03em;}
  .inst .v{font-variant-numeric:tabular-nums; font-weight:700; font-size:14.5px; margin-top:2px; color:var(--text);}
  .warn{font-size:11px; color:var(--text-2); margin-top:8px; line-height:1.4;}

  /* Floating add button */
  .fab{
    position:fixed; left:50%; bottom:calc(24px + var(--safe-bottom)); transform:translateX(-50%);
    width:56px; height:56px; border-radius:50%; background:var(--accent); color:var(--accent-text);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 26px rgba(31,58,95,.35); z-index:30;
  }
  [data-theme="dark"] .fab{ box-shadow:0 10px 26px rgba(127,168,217,.28); }
  .fab svg{width:24px;height:24px;}

  /* Sheet */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:var(--bg); border-radius:20px 20px 0 0;
    max-width:520px; margin:0 auto;
    padding:10px 20px calc(24px + var(--safe-bottom));
    transform:translateY(100%); transition:transform .25s ease;
    max-height:88vh; overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--border); border-radius:10px; margin:6px auto 14px;}
  @media (min-width:760px){
    .sheet{
      left:50%; right:auto; bottom:auto; top:50%; margin:0;
      width:100%; max-width:440px; border-radius:20px;
      padding:26px 26px 26px;
      transform:translate(-50%,-46%); opacity:0; pointer-events:none;
      transition:transform .2s ease, opacity .2s ease;
      box-shadow:0 24px 60px rgba(0,0,0,.25);
      max-height:80vh;
    }
    .sheet.show{transform:translate(-50%,-50%); opacity:1; pointer-events:auto;}
    .sheet-handle{display:none;}
  }
  .sheet h2{font-size:19px; font-weight:700; letter-spacing:-0.01em; margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-2); margin-bottom:6px; font-weight:500;}
  .field input, .field select{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:15px; font-family:inherit;
  }
  .field .price-wrap{position:relative;}
  .field .price-wrap span{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-2);}
  .field .price-wrap input{padding-left:26px;}
  .row-2{display:flex; gap:10px;}
  .row-2 > div{flex:1;}
  .btn{
    width:100%; padding:14px; border-radius:10px; border:none; font-size:15px; font-weight:600;
    cursor:pointer; font-family:inherit;
  }
  .btn-primary{background:var(--accent); color:var(--accent-text); margin-top:6px;}
  .btn-ghost{background:transparent; color:var(--text-2); margin-top:8px;}
  .inline-add{display:flex; gap:8px; margin-bottom:14px;}
  .inline-add input{flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:14px; font-family:inherit;}
  .inline-add button{padding:0 16px; border-radius:10px; border:none; background:var(--accent); color:var(--accent-text); font-weight:600; cursor:pointer;}

  /* Toggle switch */
  .switch-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:12px 14px; margin-bottom:14px;
  }
  .switch-row .txt{flex:1; padding-right:12px;}
  .switch-row .txt .t1{font-size:14.5px; font-weight:600;}
  .switch-row .txt .t2{font-size:12px; color:var(--text-2); margin-top:2px;}
  .switch{
    position:relative; width:46px; height:27px; flex-shrink:0; border-radius:100px;
    background:var(--border); cursor:pointer; transition:background .18s ease;
  }
  .switch.on{background:var(--accent);}
  .switch .knob{
    position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%;
    background:#ffffff; transition:transform .18s ease; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .switch.on .knob{transform:translateX(19px);}

  .toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
    background:var(--text); color:var(--bg); padding:10px 18px; border-radius:100px;
    font-size:13px; z-index:60; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .toast.show{opacity:1;}
  .loading{padding:60px 20px; text-align:center; color:var(--text-2); font-size:13px;}

  /* Auth screen */
  .auth-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .auth-box{
    width:100%; max-width:360px; position:relative;
    background:var(--surface); border-radius:22px;
    padding:38px 28px 28px;
    box-shadow:0 1px 2px rgba(0,0,0,.05), 0 16px 34px -18px rgba(0,0,0,.4);
  }
  .auth-box::before{
    content:'';
    position:absolute; top:11px; left:50%; transform:translateX(-50%);
    width:14px; height:14px; border-radius:50%;
    background:var(--bg);
    border:1px solid var(--border);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.18);
  }
  .auth-box::after{
    content:'';
    position:absolute; inset:9px;
    border:1.5px dashed var(--border);
    border-radius:16px;
    opacity:.6;
    pointer-events:none;
  }
  .auth-logo{
    width:56px; height:56px;
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
  }
  .auth-logo svg{width:44px; height:44px; color:var(--gold);}
  .auth-box h1{font-size:28px; font-weight:700; letter-spacing:-0.02em; margin:0 0 6px; text-align:center;}
  .auth-sub{font-size:13.5px; color:var(--text-2); text-align:center; margin:0 0 26px; line-height:1.5;}
  .auth-error{
    font-size:12.5px; color:var(--danger); margin:-4px 0 12px; min-height:16px; line-height:1.4;
  }
</style>
</head>
<body>
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C12 6.63 6.63 12 0 12C6.63 12 12 17.37 12 24C12 17.37 17.37 12 24 12C17.37 12 12 6.63 12 0Z"/></svg>
    </div>
    <h1>Wishlist</h1>
    <p class="auth-sub">Accedi per sincronizzare la lista su tutti i dispositivi</p>
    <div class="field">
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" placeholder="nome@esempio.com" autocomplete="username">
    </div>
    <div class="field">
      <label for="authPassword">Password</label>
      <input id="authPassword" type="password" placeholder="Almeno 6 caratteri" autocomplete="current-password">
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-primary" id="authSubmitBtn">Accedi</button>
    <button class="btn btn-ghost" id="authToggleBtn">Non hai un account? Registrati</button>
  </div>
</div>

<div class="app-wrap" id="appWrap" style="display:none;">
  <div class="app">
    <div class="topbar">
      <h1>Wishlist</h1>
      <div class="actions">
        <button class="icon-btn" id="editCatBtn" title="Modifica categorie" aria-label="Modifica categorie">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn" title="Cambia tema" aria-label="Cambia tema">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
        <button class="icon-btn" id="logoutBtn" title="Esci" aria-label="Esci">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="chips" id="chips"></div>

    <div class="content" id="content">
      <div class="loading">Caricamento...</div>
    </div>
  </div>

  <button class="fab" id="fabAdd" aria-label="Aggiungi oggetto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="overlay" id="overlay"></div>

<div class="sheet" id="itemSheet">
  <div class="sheet-handle"></div>
  <h2 id="itemSheetTitle">Nuovo oggetto</h2>
  <div class="field">
    <label for="fBrand">Marca</label>
    <input id="fBrand" type="text" placeholder="Es. Adidas">
  </div>
  <div class="field">
    <label for="fTitle">Titolo</label>
    <input id="fTitle" type="text" placeholder="Es. Sneakers Samba">
  </div>
  <div class="row-2">
    <div class="field">
      <label for="fPrice">Prezzo</label>
      <div class="price-wrap"><span>&euro;</span><input id="fPrice" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0,00"></div>
    </div>
    <div class="field">
      <label for="fDiscount">Prezzo scontato</label>
      <div class="price-wrap"><span>&euro;</span><input id="fDiscount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="Opzionale"></div>
    </div>
  </div>
  <div class="field">
    <label for="fCat">Categoria</label>
    <select id="fCat"></select>
  </div>
  <div class="field">
    <label for="fUrl">Sito web</label>
    <input id="fUrl" type="url" placeholder="https://...">
  </div>
  <div class="field">
    <label for="fImgFile">Immagine (opzionale)</label>
    <input id="fImgFile" type="file" accept="image/*">
    <div id="imgPreviewWrap" style="display:none; margin-top:10px; align-items:center; gap:10px;">
      <img id="imgPreview" class="thumb" alt="">
      <button type="button" id="removeImgBtn" class="btn-ghost" style="width:auto; padding:6px 10px; margin:0; font-size:13px;">Rimuovi</button>
    </div>
  </div>
  <div class="switch-row" id="payToggleRow">
    <div class="txt">
      <div class="t1">Paga in 3 con PayPal</div>
      <div class="t2">Calcola le 3 rate se attivo</div>
    </div>
    <div class="switch" id="payToggle"><div class="knob"></div></div>
  </div>
  <button class="btn btn-primary" id="saveItemBtn">Salva</button>
  <button class="btn btn-ghost" id="cancelItemBtn">Annulla</button>
</div>

<div class="sheet" id="catSheet">
  <div class="sheet-handle"></div>
  <h2>Nuova categoria</h2>
  <div class="inline-add">
    <input id="newCatInput" type="text" placeholder="Nome categoria">
    <button id="addCatConfirm">Aggiungi</button>
  </div>
  <button class="btn btn-ghost" id="cancelCatBtn">Chiudi</button>
</div>

<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div id="detailContent"></div>
  <button class="btn btn-ghost" id="closeDetailBtn">Chiudi</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  const SUPABASE_URL = 'https://qaljsehjzfadczyckbvw.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_cpvo0rwOgilOJ7NqrKZ6kQ_OOiGyHle';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.documentElement.setAttribute('data-theme', 'dark');

  let currentUserId = null;
  let authMode = 'login';
  let realtimeChannel = null;
  let state = { categories: [], items: [], theme: null };
  let currentFilter = 'all';
  let editingCategories = false;
  let editingItemId = null;
  let payIn3Active = false;

  const PALETTE = [
    { c: '#D2694F', bgL: '#FBE7E1', bgD: '#3A241D' },
    { c: '#2F8F82', bgL: '#E1F2EF', bgD: '#173430' },
    { c: '#5B5FC7', bgL: '#EAEBFB', bgD: '#242551' },
    { c: '#B98A2A', bgL: '#FAF0DA', bgD: '#3A2E12' },
    { c: '#BD4E86', bgL: '#FAE7F0', bgD: '#3A1D2C' },
    { c: '#5F8752', bgL: '#EBF2E6', bgD: '#22301D' },
    { c: '#3C7FB8', bgL: '#E6F0F9', bgD: '#1B2E3E' },
    { c: '#8657AF', bgL: '#F1E9F8', bgD: '#2D2038' }
  ];

  const $ = (id) => document.getElementById(id);
  const content = $('content');
  const chipsEl = $('chips');

  if(window.Sortable){
    Sortable.create(content, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: function(){
        const newIds = Array.prototype.map.call(content.querySelectorAll('.card'), function(el){ return el.dataset.id; });
        applyReorder(newIds);
        save();
      }
    });
  }

  function applyReorder(newIdsInOrder){
    const idToItem = {};
    state.items.forEach(function(it){ idToItem[it.id] = it; });
    const slots = [];
    state.items.forEach(function(it, idx){
      if(currentFilter === 'all' || it.categoryId === currentFilter) slots.push(idx);
    });
    slots.forEach(function(idx, i){
      if(newIdsInOrder[i] && idToItem[newIdsInOrder[i]]){
        state.items[idx] = idToItem[newIdsInOrder[i]];
      }
    });
  }

  function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }

  function isDark(){ return document.documentElement.getAttribute('data-theme') === 'dark'; }

  function catColor(cat){
    if(!cat) return null;
    const idx = (typeof cat.colorIndex === 'number' && !isNaN(cat.colorIndex)) ? cat.colorIndex : 0;
    const p = PALETTE[idx % PALETTE.length];
    return { text: p.c, bg: isDark() ? p.bgD : p.bgL };
  }

  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._h);
    toast._h = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  async function loadFromSupabase(){
    try{
      const res = await sb.from('wishlist_data').select('data').eq('user_id', currentUserId).maybeSingle();
      if(res.error) throw res.error;
      if(res.data && res.data.data){
        const parsed = res.data.data;
        state.categories = parsed.categories || [];
        state.items = parsed.items || [];
        state.theme = parsed.theme || null;
      } else {
        await save();
      }
    }catch(e){
      console.error('Load error:', e);
      toast('Errore nel caricamento dei dati');
    }
    let needsSave = false;
    state.categories.forEach(function(c, i){
      if(typeof c.colorIndex !== 'number' || isNaN(c.colorIndex)){
        c.colorIndex = i % PALETTE.length;
        needsSave = true;
      }
    });
    state.items.forEach(function(it){
      if(typeof it.payIn3 !== 'boolean'){
        it.payIn3 = false;
        needsSave = true;
      }
    });
    if(!state.itemsOrderMigrated){
      state.items = state.items.slice().reverse();
      state.itemsOrderMigrated = true;
      needsSave = true;
    }
    applyTheme();
    renderChips();
    renderItems();
    if(needsSave) save();
  }

  async function save(){
    if(!currentUserId) return;
    try{
      const res = await sb.from('wishlist_data').upsert({
        user_id: currentUserId,
        data: state,
        updated_at: new Date().toISOString()
      });
      if(res.error){ throw res.error; }
    }catch(e){
      console.error('Save error:', e);
      toast('Errore nel salvataggio');
    }
  }

  function subscribeRealtime(){
    if(realtimeChannel) sb.removeChannel(realtimeChannel);
    realtimeChannel = sb.channel('wishlist-sync-' + currentUserId)
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'wishlist_data',
        filter: 'user_id=eq.' + currentUserId
      }, function(payload){
        if(payload.new && payload.new.data){
          state.categories = payload.new.data.categories || [];
          state.items = payload.new.data.items || [];
          state.theme = payload.new.data.theme || state.theme;
          applyTheme();
          renderChips();
          renderItems();
        }
      })
      .subscribe();
  }

  function showAuthError(msg){
    $('authError').textContent = msg || '';
  }

  function setAuthMode(mode){
    authMode = mode;
    showAuthError('');
    if(mode === 'signup'){
      $('authSubmitBtn').textContent = 'Registrati';
      $('authToggleBtn').textContent = 'Hai gia un account? Accedi';
    } else {
      $('authSubmitBtn').textContent = 'Accedi';
      $('authToggleBtn').textContent = 'Non hai un account? Registrati';
    }
  }

  $('authToggleBtn').addEventListener('click', function(){
    setAuthMode(authMode === 'login' ? 'signup' : 'login');
  });

  $('authSubmitBtn').addEventListener('click', async function(){
    const email = $('authEmail').value.trim();
    const password = $('authPassword').value;
    showAuthError('');
    if(!email || !password){ showAuthError('Inserisci email e password'); return; }
    if(password.length < 6){ showAuthError('La password deve avere almeno 6 caratteri'); return; }

    $('authSubmitBtn').disabled = true;
    try{
      let result;
      if(authMode === 'signup'){
        result = await sb.auth.signUp({ email: email, password: password });
      } else {
        result = await sb.auth.signInWithPassword({ email: email, password: password });
      }
      if(result.error){
        showAuthError(result.error.message);
      } else if(authMode === 'signup' && result.data && !result.data.session){
        showAuthError('Registrazione completata. Controlla la tua email per confermare, poi accedi.');
        setAuthMode('login');
      } else if(result.data && result.data.session){
        await onAuthSuccess(result.data.session.user);
      }
    }catch(e){
      showAuthError('Si e verificato un errore, riprova.');
    }
    $('authSubmitBtn').disabled = false;
  });

  $('logoutBtn').addEventListener('click', async function(){
    if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel = null; }
    await sb.auth.signOut();
    currentUserId = null;
    state = { categories: [], items: [], theme: null };
    currentFilter = 'all';
    $('appWrap').style.display = 'none';
    $('authScreen').style.display = 'flex';
    $('authEmail').value = '';
    $('authPassword').value = '';
    setAuthMode('login');
  });

  async function onAuthSuccess(user){
    currentUserId = user.id;
    $('authScreen').style.display = 'none';
    $('appWrap').style.display = 'block';
    await loadFromSupabase();
    subscribeRealtime();
  }

  async function bootstrap(){
    const res = await sb.auth.getSession();
    if(res.data && res.data.session){
      await onAuthSuccess(res.data.session.user);
    }
  }

  function applyTheme(){
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = state.theme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    const icon = $('themeIcon');
    if(theme === 'dark'){
      icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
    } else {
      icon.innerHTML = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';
    }
  }

  $('themeBtn').addEventListener('click', function(){
    const cur = document.documentElement.getAttribute('data-theme');
    state.theme = cur === 'dark' ? 'light' : 'dark';
    applyTheme();
    renderChips();
    renderItems();
    save();
  });

  // ---- Categories ----
  function renderChips(){
    chipsEl.innerHTML = '';
    const all = document.createElement('div');
    all.className = 'chip' + (currentFilter === 'all' ? ' selected' : '');
    all.textContent = 'Tutti';
    all.addEventListener('click', function(){ currentFilter = 'all'; renderChips(); renderItems(); });
    chipsEl.appendChild(all);

    state.categories.forEach(function(cat){
      const chip = document.createElement('div');
      chip.className = 'chip' + (currentFilter === cat.id ? ' selected' : '');
      const colors = catColor(cat);
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = colors.text;
      chip.appendChild(dot);
      const label = document.createElement('span');
      label.textContent = cat.name;
      chip.appendChild(label);
      if(editingCategories){
        const rm = document.createElement('span');
        rm.className = 'rm';
        rm.textContent = String.fromCharCode(215);
        rm.addEventListener('click', function(e){
          e.stopPropagation();
          deleteCategory(cat.id);
        });
        chip.appendChild(rm);
      } else {
        chip.addEventListener('click', function(){ currentFilter = cat.id; renderChips(); renderItems(); });
      }
      chipsEl.appendChild(chip);
    });

    const addChip = document.createElement('div');
    addChip.className = 'chip add';
    addChip.textContent = editingCategories ? 'Fatto' : '+ Categoria';
    addChip.addEventListener('click', function(){
      if(editingCategories){
        editingCategories = false;
        $('editCatBtn').classList.remove('active');
        renderChips();
      } else {
        openCatSheet();
      }
    });
    chipsEl.appendChild(addChip);
  }

  $('editCatBtn').addEventListener('click', function(){
    editingCategories = !editingCategories;
    $('editCatBtn').classList.toggle('active', editingCategories);
    renderChips();
  });

  function deleteCategory(id){
    state.categories = state.categories.filter(function(c){ return c.id !== id; });
    state.items.forEach(function(it){ if(it.categoryId === id) it.categoryId = null; });
    if(currentFilter === id) currentFilter = 'all';
    renderChips();
    renderItems();
    save();
  }

  function openCatSheet(){
    $('newCatInput').value = '';
    showSheet('catSheet');
    setTimeout(function(){ $('newCatInput').focus(); }, 250);
  }
  $('cancelCatBtn').addEventListener('click', function(){ hideSheets(); });
  $('addCatConfirm').addEventListener('click', addCategory);
  $('newCatInput').addEventListener('keydown', function(e){ if(e.key === 'Enter') addCategory(); });
  function addCategory(){
    const name = $('newCatInput').value.trim();
    if(!name) return;
    state.categories.push({ id: uid(), name: name, colorIndex: state.categories.length % PALETTE.length });
    renderChips();
    populateCatSelect();
    save();
    hideSheets();
    toast('Categoria aggiunta');
  }

  // ---- Items ----
  function populateCatSelect(){
    const sel = $('fCat');
    sel.innerHTML = '<option value="">Nessuna categoria</option>';
    state.categories.forEach(function(c){
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  function fmtPrice(n){
    return n.toLocaleString('it-IT', { style:'currency', currency:'EUR' });
  }

  function calcPayIn3(price){
    const cents = Math.round(price * 100);
    const base = Math.floor(cents / 3);
    const remainder = cents - base * 3;
    const installments = [base, base, base];
    for(let i=0; i<remainder; i++){
      installments[2 - i] += 1;
    }
    return installments.map(function(c){ return c / 100; });
  }

  function domainFromUrl(url){
    try{
      const u = new URL(url);
      return u.hostname.replace(/^www\./, '');
    }catch(e){ return url; }
  }

  function getPriceInfo(item){
    const price = Number(item.price) || 0;
    const discountPrice = Number(item.discountPrice) || 0;
    const hasDiscount = discountPrice > 0 && discountPrice < price;
    const effectivePrice = hasDiscount ? discountPrice : price;
    const pct = hasDiscount ? Math.round((1 - discountPrice / price) * 100) : 0;
    return { price: price, discountPrice: discountPrice, hasDiscount: hasDiscount, effectivePrice: effectivePrice, pct: pct };
  }

  function buildPriceBlockHtml(info){
    if(info.price <= 0) return '<span class="card-price"></span>';
    if(info.hasDiscount){
      return '<div class="price-block">' +
          '<div class="price-top"><span class="tag-sale">Saldo</span><span class="card-price">' + fmtPrice(info.discountPrice) + '</span></div>' +
          '<div class="price-old"><span class="strike">' + fmtPrice(info.price) + '</span><span class="pct">-' + info.pct + '%</span></div>' +
        '</div>';
    }
    return '<span class="card-price">' + fmtPrice(info.price) + '</span>';
  }

  function buildInstallmentsHtml(price, payIn3){
    if(!(price > 0) || !payIn3) return '';
    const inst = calcPayIn3(price);
    const outOfRange = price < 30 || price > 2000;
    return '<div class="stub">' +
        '<div class="stub-head">' +
          '<span class="label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>Paga in 3 con PayPal</span>' +
          (outOfRange ? '' : '<span class="note">senza interessi</span>') +
        '</div>' +
        '<div class="installments">' +
          '<div class="inst"><div class="n">Oggi</div><div class="v">' + fmtPrice(inst[0]) + '</div></div>' +
          '<div class="inst"><div class="n">+30gg</div><div class="v">' + fmtPrice(inst[1]) + '</div></div>' +
          '<div class="inst"><div class="n">+60gg</div><div class="v">' + fmtPrice(inst[2]) + '</div></div>' +
        '</div>' +
        (outOfRange ? '<div class="warn">Paga in 3 e in genere disponibile per importi tra 30 e 2000 euro, verifica i requisiti su PayPal.</div>' : '') +
      '</div>';
  }

  function renderItems(){
    content.innerHTML = '';
    const list = state.items.filter(function(it){ return currentFilter === 'all' || it.categoryId === currentFilter; });

    if(list.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '<div class="big">&#10022;</div><p><strong>Nessun oggetto qui.</strong></p><p>Tocca il pulsante + per aggiungere il primo oggetto desiderato.</p>';
      content.appendChild(empty);
      return;
    }

    list.forEach(function(item){
      const card = document.createElement('div');
      card.className = 'card';

      const cat = state.categories.find(function(c){ return c.id === item.categoryId; });
      const priceInfo = getPriceInfo(item);
      const colors = catColor(cat);

      const brandHtml = item.brand ? '<div class="brand-label">' + escapeHtml(item.brand) + '</div>' : '';

      let titleHtml;
      if(item.url){
        titleHtml = '<a class="card-title" href="' + escapeAttr(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.title) +
          ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>';
      } else {
        titleHtml = '<span class="card-title">' + escapeHtml(item.title) + '</span>';
      }

      const tagHtml = cat
        ? '<span class="tag" style="background:' + colors.bg + ';color:' + colors.text + '">' + escapeHtml(cat.name) + '</span>'
        : '';

      const installmentsHtml = buildInstallmentsHtml(priceInfo.effectivePrice, item.payIn3);

      const thumbHtml = item.imageUrl
        ? '<button type="button" class="thumb-btn" data-detail-id="' + item.id + '"><img class="thumb" src="' + escapeAttr(item.imageUrl) + '" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML=\'<div class=&quot;thumb thumb-broken&quot;>?</div>\'"></button>'
        : '';

      card.innerHTML =
        '<div class="card-body">' +
          '<div class="thumb-col">' + thumbHtml + tagHtml + '</div>' +
          '<div class="card-main">' +
            '<div class="card-top">' +
              '<div>' + brandHtml + '<div class="title-line">' + titleHtml + '</div></div>' +
              buildPriceBlockHtml(priceInfo) +
            '</div>' +
            installmentsHtml +
            '<div class="card-bottom">' +
              '<div class="card-menu">' +
                '<button class="kebab" aria-label="Modifica oggetto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>' +
              '</div>' +
              '<button class="drag-handle" aria-label="Trascina per riordinare"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg></button>' +
            '</div>' +
          '</div>' +
        '</div>';

      card.dataset.id = item.id;

      const thumbBtn = card.querySelector('.thumb-btn');
      if(thumbBtn){
        thumbBtn.addEventListener('click', function(){ openDetailSheet(item); });
      }

      const kebab = card.querySelector('.kebab');
      kebab.addEventListener('click', function(e){
        e.stopPropagation();
        closeAllMenus();
        const pop = document.createElement('div');
        pop.className = 'menu-pop';
        pop.innerHTML = '<button class="edit">Modifica</button><button class="del">Elimina</button>';
        pop.querySelector('.edit').addEventListener('click', function(){ openItemSheet(item); pop.remove(); });
        pop.querySelector('.del').addEventListener('click', function(){ deleteItem(item.id); pop.remove(); });
        card.querySelector('.card-menu').appendChild(pop);
        document.addEventListener('click', function h(ev){ pop.remove(); document.removeEventListener('click', h); }, {once:true});
      });

      content.appendChild(card);
    });
  }

  function closeAllMenus(){
    document.querySelectorAll('.menu-pop').forEach(function(p){ p.remove(); });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m];
    });
  }
  function escapeAttr(str){ return escapeHtml(str); }

  function deleteItem(id){
    state.items = state.items.filter(function(it){ return it.id !== id; });
    renderItems();
    save();
    toast('Oggetto eliminato');
  }

  // ---- Sheets ----
  function showSheet(id){
    $('overlay').classList.add('show');
    $(id).classList.add('show');
  }
  function hideSheets(){
    $('overlay').classList.remove('show');
    document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('show'); });
    editingItemId = null;
  }
  $('overlay').addEventListener('click', hideSheets);

  function openDetailSheet(item){
    const cat = state.categories.find(function(c){ return c.id === item.categoryId; });
    const priceInfo = getPriceInfo(item);
    const colors = catColor(cat);

    const imageHtml = item.imageUrl
      ? '<img class="detail-image" src="' + escapeAttr(item.imageUrl) + '" alt="">'
      : '';

    const brandHtml = item.brand ? '<div class="brand-label">' + escapeHtml(item.brand) + '</div>' : '';

    let titleHtml;
    if(item.url){
      titleHtml = '<a class="detail-title" href="' + escapeAttr(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.title) +
        ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>';
    } else {
      titleHtml = '<span class="detail-title">' + escapeHtml(item.title) + '</span>';
    }

    const tagHtml = cat
      ? '<span class="tag" style="background:' + colors.bg + ';color:' + colors.text + '">' + escapeHtml(cat.name) + '</span>'
      : '';

    const priceRowHtml = priceInfo.hasDiscount
      ? '<div class="detail-row"><div class="price-block" style="align-items:flex-start;">' +
          '<div class="price-top"><span class="tag-sale">Saldo</span><span class="detail-price">' + fmtPrice(priceInfo.discountPrice) + '</span></div>' +
          '<div class="price-old"><span class="strike">' + fmtPrice(priceInfo.price) + '</span><span class="pct">-' + priceInfo.pct + '%</span></div>' +
        '</div></div>'
      : '<div class="detail-row"><span class="detail-price">' + (priceInfo.price > 0 ? fmtPrice(priceInfo.price) : '') + '</span></div>';

    $('detailContent').innerHTML =
      imageHtml +
      brandHtml +
      '<div class="title-line">' + titleHtml + tagHtml + '</div>' +
      priceRowHtml +
      buildInstallmentsHtml(priceInfo.effectivePrice, item.payIn3);

    showSheet('detailSheet');
  }
  $('closeDetailBtn').addEventListener('click', hideSheets);

  $('fabAdd').addEventListener('click', function(){ openItemSheet(); });

  function setPayToggle(on){
    payIn3Active = on;
    $('payToggle').classList.toggle('on', on);
  }
  $('payToggle').addEventListener('click', function(){ setPayToggle(!payIn3Active); });

  let currentImageData = null;

  function showImgPreview(dataUrl){
    currentImageData = dataUrl;
    const wrap = $('imgPreviewWrap');
    if(dataUrl){
      $('imgPreview').src = dataUrl;
      wrap.style.display = 'flex';
    } else {
      wrap.style.display = 'none';
    }
  }

  function resizeImageFile(file){
    return new Promise(function(resolve, reject){
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = function(){
        const img = new Image();
        img.onerror = reject;
        img.onload = function(){
          const maxSize = 300;
          let w = img.width, h = img.height;
          if(w > h){ if(w > maxSize){ h = Math.round(h * (maxSize / w)); w = maxSize; } }
          else { if(h > maxSize){ w = Math.round(w * (maxSize / h)); h = maxSize; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  $('fImgFile').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    resizeImageFile(file).then(function(dataUrl){
      showImgPreview(dataUrl);
    }).catch(function(){
      toast('Non riesco a leggere questa immagine');
    });
  });

  $('removeImgBtn').addEventListener('click', function(){
    showImgPreview(null);
    $('fImgFile').value = '';
  });

  function openItemSheet(item){
    populateCatSelect();
    if(item){
      editingItemId = item.id;
      $('itemSheetTitle').textContent = 'Modifica oggetto';
      $('fBrand').value = item.brand || '';
      $('fTitle').value = item.title || '';
      $('fPrice').value = item.price || '';
      $('fDiscount').value = item.discountPrice || '';
      $('fUrl').value = item.url || '';
      $('fImgFile').value = '';
      showImgPreview(item.imageUrl || null);
      $('fCat').value = item.categoryId || '';
      setPayToggle(!!item.payIn3);
    } else {
      editingItemId = null;
      $('itemSheetTitle').textContent = 'Nuovo oggetto';
      $('fBrand').value = '';
      $('fTitle').value = '';
      $('fPrice').value = '';
      $('fDiscount').value = '';
      $('fUrl').value = '';
      $('fImgFile').value = '';
      showImgPreview(null);
      $('fCat').value = currentFilter !== 'all' ? currentFilter : '';
      setPayToggle(false);
    }
    showSheet('itemSheet');
    setTimeout(function(){ $('fTitle').focus(); }, 250);
  }

  $('cancelItemBtn').addEventListener('click', hideSheets);

  $('saveItemBtn').addEventListener('click', function(){
    const brand = $('fBrand').value.trim();
    const title = $('fTitle').value.trim();
    const price = parseFloat($('fPrice').value);
    const discountRaw = $('fDiscount').value.trim();
    const discountPrice = discountRaw ? parseFloat(discountRaw) : 0;
    const url = $('fUrl').value.trim();
    const imageUrl = currentImageData;
    const categoryId = $('fCat').value || null;
    const payIn3 = payIn3Active;

    if(!title){ toast('Inserisci un titolo'); return; }
    if(url && !/^https?:\/\//i.test(url)){ toast('Il sito deve iniziare con http:// o https://'); return; }
    if(discountRaw && !isNaN(discountPrice) && discountPrice > 0 && !isNaN(price) && discountPrice >= price){
      toast('Il prezzo scontato deve essere minore del prezzo pieno');
      return;
    }

    if(editingItemId){
      const it = state.items.find(function(i){ return i.id === editingItemId; });
      if(it){
        it.brand = brand;
        it.title = title;
        it.price = isNaN(price) ? 0 : price;
        it.discountPrice = isNaN(discountPrice) ? 0 : discountPrice;
        it.url = url;
        it.imageUrl = imageUrl;
        it.categoryId = categoryId;
        it.payIn3 = payIn3;
      }
      toast('Oggetto aggiornato');
    } else {
      state.items.unshift({
        id: uid(),
        brand: brand,
        title: title,
        price: isNaN(price) ? 0 : price,
        discountPrice: isNaN(discountPrice) ? 0 : discountPrice,
        url: url,
        imageUrl: imageUrl,
        categoryId: categoryId,
        payIn3: payIn3,
        createdAt: Date.now()
      });
      toast('Oggetto aggiunto');
    }
    hideSheets();
    renderItems();
    save();
  });

  bootstrap();
})();
</script>
</body>
</html>
